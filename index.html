
<!-- Tutorial HTML -->
<!-- Documentación al precionar ctrl + } -->




<!-- Indicamos que este documento usa HTML5
 Anteriormente existian HTML4 Y XHTML.
 El navegador necesita saber cómo interpretar la página 
 y qué reglas usar. ¿Qué pasa si no se pone?
 El navegador entra en algo llamado Quirks Mode, 
 esto puede romper estilos, interpretar raro el CSS 
 y comportarse distinto -->
<!DOCTYPE html>
<!-- Esta es la raíz de TODO el documento HTML. Esta sección
 le dice al navegador el idioma principal es ingles. Es importante por:
 Accesibilidad, lectores de pantalla, SEO, traducción automática
 y buscadores. es si lo quieres en español -->
<html lang=" en">  
<!-- Head contiene informacion sobre la página, NO contenido visible 
principal. Normalmente van: Metadatos, título, CSS, fuentes scripts, SEO
y configuraciones. Entiendase head=Configuración interna del sitio. 
Body=Lo que ve el usuario  -->
<head>
    <!-- Metadatos -->
     <!-- Define la codificación de caracteres. Importa porque:
    permite mostrar correctamente tildes, ñ, símbolos y emojis.
    es decir, evita errores de encoding/carácteres incorruptos. 
    UTF-8 es el estándart moderno-->
    <meta charset="UTF-8"> 
    <!-- El Viewport le dice al navegador que ajuste el ancho al dispositivo
     Esta línea ayuda a: Responsive desing, móviles, tablets, escalado correcto. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Definimos el nombre de la pestaña del navegador.Tambien sirve para SEO, 
     favoritos, historial y buscadores -->
    <title>
        Prácticas Web Katlyn Fernández
    </title>
</head>
<!-- Esta sección contiene todo lo visible  -->
<body>
    <h1>
        Hola Web
    </h1>
</body>
</html>
